<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Check-in</title>
<style>
  :root {
    --ink: #1c1f26;
    --paper: #f6f5f2;
    --line: #d8d5cd;
    --accent: #2f5d50;
    --accent-dim: #dce8e4;
    --error: #a6402f;
    --error-dim: #f4e2de;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 32px 28px;
  }
  h1 {
    font-size: 1.3rem;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub {
    color: #6b6f76;
    font-size: 0.9rem;
    margin: 0 0 28px;
  }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #6b6f76;
    margin-bottom: 8px;
  }
  input[type="text"] {
    width: 100%;
    font-size: 1.6rem;
    letter-spacing: 0.3em;
    text-align: center;
    padding: 14px 10px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
    font-variant-numeric: tabular-nums;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }
  button {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .status {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 0.92rem;
    line-height: 1.45;
    display: none;
  }
  .status.show { display: block; }
  .status.success {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .status.error {
    background: var(--error-dim);
    color: var(--error);
    border: 1px solid var(--error);
  }
  .status.info {
    background: #eef1f5;
    color: #43505f;
    border: 1px solid #d3dae2;
  }
  .location-note {
    font-size: 0.78rem;
    color: #8a8e95;
    margin-top: 16px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Office check-in</h1>
  <p class="sub">Enter the 6-digit code from your authenticator app.</p>

  <form id="checkin-form" autocomplete="off">
    <label for="totp">Authentication code</label>
    <input
      type="text"
      id="totp"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="6"
      placeholder="000000"
      required
    >
    <button type="submit" id="submit-btn">Mark attendance</button>
  </form>

  <div id="status" class="status"></div>
  <p class="location-note" id="location-note">Requesting your location…</p>
</div>

<script>
  // ---- Configure this ----
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzGePhz6fIvEJIjCI57lQ2cV1FgaZkdD6ORjYsrGa0ZB4rp3vi5ETMqyHv3Z4Zb84MkVw/exec";
  // -------------------------

  const form = document.getElementById('checkin-form');
  const totpInput = document.getElementById('totp');
  const submitBtn = document.getElementById('submit-btn');
  const statusEl = document.getElementById('status');
  const locationNote = document.getElementById('location-note');

  let currentPosition = null;

  function setStatus(kind, message) {
    statusEl.className = 'status show ' + kind;
    statusEl.textContent = message;
  }

  function requestLocation() {
    if (!navigator.geolocation) {
      locationNote.textContent = 'Location is not supported on this browser. You cannot check in from here.';
      submitBtn.disabled = true;
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        currentPosition = pos.coords;
        locationNote.textContent = 'Location ready.';
        submitBtn.disabled = false;
      },
      (err) => {
        locationNote.textContent = 'Location permission is required to check in. Please allow location access and refresh.';
        submitBtn.disabled = true;
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  totpInput.addEventListener('input', () => {
    totpInput.value = totpInput.value.replace(/[^0-9]/g, '').slice(0, 6);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!currentPosition) {
      setStatus('error', 'Location not ready yet. Please wait a moment and try again.');
      return;
    }
    if (totpInput.value.length !== 6) {
      setStatus('error', 'Enter the full 6-digit code.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Checking…';
    statusEl.className = 'status show info';
    statusEl.textContent = 'Verifying…';

    try {
      const body = new URLSearchParams({
        totp_code: totpInput.value,
        lat: currentPosition.latitude,
        lng: currentPosition.longitude
      });

      const res = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: body
      });

      const data = await res.json();

      if (data.status === 'success') {
        setStatus('success', data.message);
        form.reset();
      } else {
        setStatus('error', data.message || 'Please refresh the page and enter your TOTP again. If the issue persists, contact admin.');
      }
    } catch (err) {
      setStatus('error', 'Could not reach the server. Please refresh the page and enter your TOTP again. If the issue persists, contact admin.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Mark attendance';
    }
  });

  requestLocation();
</script>

</body>
</html>
